services:
  app:
    build: .
    container_name: kg-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    # Hot reload: bind-mount the project root onto the container WORKDIR so
    # edits to graphrag/, streamlit_pages/, app.py are picked up live by Streamlit.
    volumes:
      - .:/knowledge-graphs
      - ./source_folder:/knowledge-graphs/source_folder
    networks:
      - graphnet

  neo4j:
    image: neo4j:2025.03.0
    container_name: kg-neo4j
    ports:
      - "7474:7474"  # Neo4j Browser
      - "7687:7687"  # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_server_memory_pagecache_size=512M
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_PLUGINS=["graph-data-science", "apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*,gds.*
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_meta_enabled=true
      - NEO4J_apoc_export_file_enabled=true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    volumes:
      - neo4j_data:/data
    networks:
      - graphnet

volumes:
  neo4j_data:

networks:
  graphnet:
    driver: bridge
